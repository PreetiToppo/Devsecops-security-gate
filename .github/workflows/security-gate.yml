name: Security Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  security-scan:
    name: Run Security Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # for uploading SARIF to GitHub Security tab
      pull-requests: write     # for PR comments

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Install scanners ──────────────────────────────────────────────────
      - name: Install Semgrep
        run: pip install semgrep

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install fastapi uvicorn psycopg2-binary

      # ── Run the gate ──────────────────────────────────────────────────────
      - name: Run Security Gate
        id: gate
        run: |
          python run_scan.py \
            --path . \
            --max-critical 0 \
            --max-high 5 \
            --output security-report.json
        continue-on-error: true   # capture exit code, don't fail the step yet

      - name: Parse gate result
        id: result
        run: |
          PASSED=$(python -c "import json; d=json.load(open('security-report.json')); print(str(d['passed_gate']).lower())")
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          python -c "
          import json
          d = json.load(open('security-report.json'))
          s = d['summary']
          print(f'CRITICAL={s[\"CRITICAL\"]} HIGH={s[\"HIGH\"]} MEDIUM={s[\"MEDIUM\"]} LOW={s[\"LOW\"]}')
          "

      # ── Upload report as artifact ─────────────────────────────────────────
      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.json

      # ── Comment on PR ─────────────────────────────────────────────────────
      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('security-report.json'));
            const s = report.summary;
            const passed = report.passed_gate;
            const icon = passed ? '✅' : '❌';
            const status = passed ? 'PASSED' : 'FAILED — merge blocked';

            const body = `## ${icon} Security Gate: ${status}

            | Severity | Count |
            |----------|-------|
            | 🔴 CRITICAL | ${s.CRITICAL} |
            | 🟠 HIGH     | ${s.HIGH}     |
            | 🟡 MEDIUM   | ${s.MEDIUM}   |
            | 🟢 LOW      | ${s.LOW}      |

            ${!passed ? '> ⚠️ **This PR cannot be merged until critical/high issues are resolved.**' : '> All thresholds met. Safe to merge.'}

            _Scanned by [DevSecOps Security Gate](https://github.com/${{ github.repository }})_`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      # ── Fail the build if gate failed ─────────────────────────────────────
      - name: Enforce gate decision
        if: steps.result.outputs.passed == 'false'
        run: |
          echo "❌ Security gate FAILED. Fix critical/high vulnerabilities before merging."
          exit 1
